<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Разработка компонентов - Users</title>
    <style>
        * {
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }
        body {
            padding: 30px;
            max-width: 950px;
            margin: 0 auto;
        }
        .form-row {
            display: flex;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 30px;
        }
        .input-wrap {
            text-align: center;
        }
        .input-wrap label {
            display: block;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .input-wrap input {
            padding: 10px;
            font-size: 18px;
            border: 1px solid #999;
        }
        #inp-fn { width: 180px; }
        #inp-ln { width: 180px; }
        #inp-email { width: 240px; }
        .btn-add {
            background-color: #dc3545;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 4px;
            cursor: pointer;
        }
        hr {
            margin: 20px 0;
        }
        h2 {
            font-size: 36px;
            margin: 15px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 20px;
        }
        th, td {
            text-align: left;
            padding: 12px;
        }
        tr:nth-child(odd) {
            background-color: #f1f1f1;
        }
        .btn-del {
            background-color: #dc3545;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 添加用户表单 -->
    <div class="form-row">
        <button class="btn-add" id="addBtn">Add User</button>
        <div class="input-wrap">
            <label>FirstName</label>
            <input type="text" id="inp-fn">
        </div>
        <div class="input-wrap">
            <label>LastName</label>
            <input type="text" id="inp-ln">
        </div>
        <div class="input-wrap">
            <label>Email</label>
            <input type="email" id="inp-email">
        </div>
    </div>
    <hr>

    <!-- 用户列表 -->
    <h2>Users</h2>
    <table id="userTable">
        <thead>
            <tr>
                <th>Id</th>
                <th>FirstName</th>
                <th>LastName</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- JS动态渲染数据 -->
        </tbody>
    </table>

    <script>
        // 初始数据
        let userList = [
            { id: 1, firstName: 'John', lastName: 'Doe', email: 'john@gmail.com' },
            { id: 2, firstName: 'Dhiraj', lastName: 'Ray', email: 'only2dhir@gmail.com' }
        ];

        const inpFn = document.getElementById('inp-fn');
        const inpLn = document.getElementById('inp-ln');
        const inpEmail = document.getElementById('inp-email');
        const addBtn = document.getElementById('addBtn');
        const tableBody = document.getElementById('tableBody');

        // 渲染表格
        function renderList() {
            tableBody.innerHTML = '';
            userList.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.firstName}</td>
                    <td>${user.lastName}</td>
                    <td>${user.email}</td>
                    <td><button class="btn-del" onclick="deleteUser(${user.id})">Delete</button></td>
                `;
                tableBody.appendChild(tr);
            })
        }

        // 删除用户
        window.deleteUser = function(delId) {
            userList = userList.filter(u => u.id !== delId);
            renderList();
        }

        // 添加用户
        addBtn.addEventListener('click', () => {
            const fn = inpFn.value.trim();
            const ln = inpLn.value.trim();
            const email = inpEmail.value.trim();
            if (!fn || !ln || !email) {
                alert('Заполните все поля!');
                return;
            }
            // 生成新ID
            const newId = userList.length ? Math.max(...userList.map(u=>u.id)) + 1 : 1;
            userList.push({
                id: newId,
                firstName: fn,
                lastName: ln,
                email: email
            })
            // 清空输入框
            inpFn.value = '';
            inpLn.value = '';
            inpEmail.value = '';
            renderList();
        })

        // 页面初始化渲染
        renderList();
    </script>
</body>
</html>
